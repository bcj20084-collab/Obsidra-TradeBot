name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Secret scan
        run: docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:3.88.23 git file:///repo --only-verified --fail
      - name: Install Railway CLI
        if: env.RAILWAY_TOKEN != '' && env.RAILWAY_SERVICE != ''
        run: npm install --global @railway/cli@4
      - name: Deploy
        if: env.RAILWAY_TOKEN != '' && env.RAILWAY_SERVICE != ''
        run: railway up --service "$RAILWAY_SERVICE" --detach
      - name: Railway GitHub integration
        if: env.RAILWAY_TOKEN == '' || env.RAILWAY_SERVICE == ''
        run: echo "Railway CLI secrets are not configured; deployment is delegated to Railway's GitHub integration."
