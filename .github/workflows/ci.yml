name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Generate Prisma Client
        run: cd packages/engine && DATABASE_URL="postgresql://local:local@localhost:5432/obsidra" pnpm exec prisma generate --schema src/db/prisma/schema.prisma
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
